services:
  # A Docker web service
  - type: web
    name: lost-and-found-app
    env: docker
    region: singapore # Choose a region closest to your users
    plan: free # Adjust as needed
    branch: master # Deploy from master branch
    dockerfilePath: ./Dockerfile/Dockerfile
    dockerContext: .
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false # This will be manually set in Render dashboard
      - key: JWT_SECRET
        generateValue: true # Auto-generate a secure secret
      - key: ALLOWED_ORIGINS
        value: https://lost-and-found-app.onrender.com