name: CI/CD Pipeline

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: BACKEND/package-lock.json

      - name: Install dependencies
        working-directory: BACKEND
        run: npm install

      - name: Run integration tests
        working-directory: BACKEND
        env:
          PORT: 5000
          NODE_ENV: test
          JWT_SECRET: test-secret-for-ci
          TEST_MONGO_URI: mongodb://localhost:27017/lostAndFound_test
        run: npm test

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t lost-and-found-app -f Dockerfile/Dockerfile .

      - name: Verify image starts
        run: |
          docker run -d \
            --name test-container \
            -e PORT=5000 \
            -e NODE_ENV=production \
            -e MONGO_URI=mongodb://host.docker.internal:27017/lostAndFound \
            -e JWT_SECRET=ci-test-secret \
            -p 5000:5000 \
            lost-and-found-app
          sleep 5
          docker ps | grep test-container
          docker stop test-container

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && secrets.RENDER_DEPLOY_HOOK_URL != ''

    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "⚠️  RENDER_DEPLOY_HOOK_URL secret not set. Skipping deployment."
            exit 0
          fi
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null -w "HTTP status: %{http_code}\n"
